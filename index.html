<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>9컷 액자 메이커</title>
  <style>
    :root{color-scheme:light;--ink:#172033;--muted:#667085;--line:#d8dee8;--paper:#f4f1eb;--panel:#fff;--accent:#235f9f;--accent-dark:#173f6c;--shadow:0 18px 48px rgba(23,32,51,.09)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:Arial,"Noto Sans KR",sans-serif}button,input,select{font:inherit}button{border:1px solid var(--accent);border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;font-weight:800;padding:10px 14px}button[type=button]:not(#downloadButton){background:#fff;color:var(--accent-dark)}button:hover{filter:brightness(.96)}
    .app{max-width:1440px;margin:0 auto;padding:28px}.topbar{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:22px}.eyebrow{margin:0 0 6px;color:var(--accent);font-size:13px;font-weight:900;letter-spacing:0}h1,p{margin-top:0}h1{margin-bottom:8px;font-size:42px;line-height:1.08}.intro{max-width:640px;margin-bottom:0;color:var(--muted);font-size:17px}
    .counter{min-width:112px;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow);padding:14px 18px;text-align:right}.counter strong{font-size:34px}.counter span{color:var(--muted)}
    .workspace{display:grid;grid-template-columns:360px minmax(0,1fr);gap:24px;align-items:start}.panel,.preview-area,.thumb-panel{border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow)}.controls{display:grid;gap:16px;padding:18px}
    .drop-zone{position:relative;display:grid;gap:6px;border:1px dashed #aeb9c8;border-radius:8px;background:#f8fafc;cursor:pointer;padding:22px;text-align:center}.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}.drop-zone strong{color:var(--accent-dark);font-size:18px}.drop-zone span{color:var(--muted);font-size:13px}
    .control-group,.range-grid label,.color-row label{display:grid;gap:7px;color:var(--muted);font-size:13px;font-weight:900}input,select{width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);padding:10px 11px}input[type=range]{padding:0}input[type=color]{height:42px;padding:4px}input:focus,select:focus{border-color:var(--accent);outline:3px solid rgba(35,95,159,.14)}
    .range-grid,.color-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.button-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.message{min-height:18px;margin:0;color:var(--muted);font-size:13px}.download-shelf{display:grid;gap:8px}.download-link{display:flex;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:8px;background:#f8fafc;color:var(--accent-dark);font-size:13px;font-weight:800;padding:10px 12px;text-decoration:none}
    .preview-area{display:grid;place-items:center;min-height:640px;overflow:auto;padding:18px}canvas{display:block;width:min(100%,900px);height:auto;border-radius:8px;background:#fff}.thumb-panel{margin-top:20px;padding:16px}.thumb-grid{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:10px}.thumb{position:relative;overflow:hidden;aspect-ratio:1;border:1px solid var(--line);border-radius:8px;background:#eef2f6}.thumb img{width:100%;height:100%;object-fit:cover}.thumb span{position:absolute;top:6px;left:6px;display:grid;place-items:center;width:24px;height:24px;border-radius:999px;background:rgba(255,255,255,.86);color:var(--ink);font-size:12px;font-weight:900}
    @media (max-width:1040px){.workspace{grid-template-columns:1fr}.thumb-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}@media (max-width:680px){.app{padding:18px}.topbar{align-items:stretch;flex-direction:column}h1{font-size:32px}.button-row,.range-grid,.color-row{grid-template-columns:1fr}.preview-area{min-height:360px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Nine Photo Frame Maker</p>
        <h1>9컷 액자 메이커</h1>
        <p class="intro">사진 9장을 넣고 원하는 액자 스타일로 3x3 콜라주를 만듭니다.</p>
      </div>
      <div class="counter" aria-label="사진 개수"><strong id="photoCount">0</strong><span>/ 9</span></div>
    </header>
    <section class="workspace">
      <aside class="panel controls" aria-label="제작 도구">
        <label class="drop-zone" for="photoInput"><input id="photoInput" type="file" accept="image/*" multiple><strong>사진 9장 넣기</strong><span>여러 장을 한 번에 선택하거나 다시 선택해 교체</span></label>
        <div class="control-group"><label for="frameStyle">액자 스타일</label><select id="frameStyle"><option value="gallery">화이트 갤러리</option><option value="black">블랙 갤러리</option><option value="wood">우드 프레임</option><option value="polaroid">폴라로이드</option><option value="film">필름 스트립</option><option value="soft">소프트 라운드</option><option value="scrap">스크랩북</option></select></div>
        <div class="control-group"><label for="canvasRatio">출력 비율</label><select id="canvasRatio"><option value="square">1:1 정사각</option><option value="portrait">4:5 세로</option><option value="story">9:16 스토리</option><option value="landscape">16:9 가로</option></select></div>
        <div class="control-group"><label for="titleInput">제목</label><input id="titleInput" maxlength="34" value="Blue House Frame"></div>
        <div class="control-group"><label for="subtitleInput">설명</label><input id="subtitleInput" maxlength="60" value="9 photos in a framed grid"></div>
        <div class="range-grid"><label>바깥 여백<input id="outerPadding" type="range" min="24" max="150" value="72"></label><label>사진 간격<input id="gridGap" type="range" min="0" max="48" value="18"></label><label>액자 두께<input id="frameSize" type="range" min="0" max="54" value="18"></label><label>모서리<input id="cornerRadius" type="range" min="0" max="48" value="16"></label></div>
        <div class="color-row"><label>배경색<input id="backgroundColor" type="color" value="#f3f5f7"></label><label>액자색<input id="frameColor" type="color" value="#ffffff"></label></div>
        <div class="button-row"><button id="sampleButton" type="button">샘플 넣기</button><button id="clearButton" type="button">비우기</button><button id="downloadButton" type="button">PNG 저장</button></div>
        <p id="message" class="message" role="status"></p><div id="downloadShelf" class="download-shelf" aria-live="polite"></div>
      </aside>
      <section class="preview-area" aria-label="미리보기"><canvas id="previewCanvas" width="1600" height="1600"></canvas></section>
    </section>
    <section class="thumb-panel" aria-label="사진 목록"><div id="thumbGrid" class="thumb-grid"></div></section>
  </main>
  <script>
    const SLOT_COUNT=9,state={photos:Array.from({length:SLOT_COUNT},()=>null)},$=s=>document.querySelector(s),elements={photoInput:$("#photoInput"),frameStyle:$("#frameStyle"),canvasRatio:$("#canvasRatio"),titleInput:$("#titleInput"),subtitleInput:$("#subtitleInput"),outerPadding:$("#outerPadding"),gridGap:$("#gridGap"),frameSize:$("#frameSize"),cornerRadius:$("#cornerRadius"),backgroundColor:$("#backgroundColor"),frameColor:$("#frameColor"),sampleButton:$("#sampleButton"),clearButton:$("#clearButton"),downloadButton:$("#downloadButton"),message:$("#message"),downloadShelf:$("#downloadShelf"),photoCount:$("#photoCount"),thumbGrid:$("#thumbGrid"),canvas:$("#previewCanvas")},ctx=elements.canvas.getContext("2d");
    init();
    function init(){elements.photoInput.addEventListener("change",handleFiles);[elements.frameStyle,elements.canvasRatio,elements.titleInput,elements.subtitleInput,elements.outerPadding,elements.gridGap,elements.frameSize,elements.cornerRadius,elements.backgroundColor,elements.frameColor].forEach(c=>c.addEventListener("input",render));elements.sampleButton.addEventListener("click",loadSamples);elements.clearButton.addEventListener("click",clearPhotos);elements.downloadButton.addEventListener("click",downloadPng);renderThumbs();render()}
    async function handleFiles(e){const files=Array.from(e.target.files||[]).filter(f=>f.type.startsWith("image/")).slice(0,SLOT_COUNT);if(!files.length){showMessage("이미지 파일을 선택해 주세요.");return}const photos=await Promise.all(files.map(fileToImage));state.photos=Array.from({length:SLOT_COUNT},(_,i)=>photos[i]||null);showMessage(`${photos.length}장을 넣었습니다.`);renderThumbs();render()}
    async function loadSamples(){state.photos=await Promise.all(Array.from({length:SLOT_COUNT},(_,i)=>loadImage(sampleDataUrl(i))));elements.titleInput.value="Blue House Frame";elements.subtitleInput.value="rounded 3x3 framed collage";showMessage("샘플 9장을 넣었습니다.");renderThumbs();render()}
    function clearPhotos(){state.photos=Array.from({length:SLOT_COUNT},()=>null);elements.photoInput.value="";showMessage("사진을 비웠습니다.");renderThumbs();render()}
    function renderThumbs(){elements.thumbGrid.innerHTML="";state.photos.forEach((photo,index)=>{const item=document.createElement("div");item.className="thumb";const number=document.createElement("span");number.textContent=index+1;item.append(number);if(photo){const img=document.createElement("img");img.src=photo.src;img.alt=`${index+1}번 사진`;item.append(img)}elements.thumbGrid.append(item)});elements.photoCount.textContent=state.photos.filter(Boolean).length}
    function render(){const options=getOptions();setCanvasSize(options.ratio);drawCollage(options)}
    function getOptions(){return{style:elements.frameStyle.value,ratio:elements.canvasRatio.value,title:elements.titleInput.value.trim(),subtitle:elements.subtitleInput.value.trim(),padding:Number(elements.outerPadding.value),gap:Number(elements.gridGap.value),frame:Number(elements.frameSize.value),radius:Number(elements.cornerRadius.value),background:elements.backgroundColor.value,frameColor:elements.frameColor.value}}
    function setCanvasSize(ratio){const sizes={square:[1600,1600],portrait:[1440,1800],story:[1080,1920],landscape:[1920,1080]},[w,h]=sizes[ratio]||sizes.square;elements.canvas.width=w;elements.canvas.height=h}
    function drawCollage(options){const{width,height}=elements.canvas,style=getStyle(options),headerHeight=options.title||options.subtitle?Math.min(190,height*.15):0;ctx.clearRect(0,0,width,height);drawBackground(style,width,height);drawHeader(options,style,width);const gridTop=options.padding+headerHeight,gridLeft=options.padding,gridWidth=width-options.padding*2,gridHeight=height-gridTop-options.padding,gridSize=Math.min(gridWidth,gridHeight),left=gridLeft+(gridWidth-gridSize)/2,top=gridTop+(gridHeight-gridSize)/2,cell=(gridSize-options.gap*2)/3;if(style.outerShadow){ctx.save();ctx.shadowColor=style.outerShadow;ctx.shadowBlur=28;ctx.shadowOffsetY=18;roundedRect(ctx,left-options.frame,top-options.frame,gridSize+options.frame*2,gridSize+options.frame*2,options.radius+options.frame);ctx.fillStyle=style.shadowBase;ctx.fill();ctx.restore()}for(let i=0;i<SLOT_COUNT;i++){const row=Math.floor(i/3),col=i%3,x=left+col*(cell+options.gap),y=top+row*(cell+options.gap);drawFramedPhoto(state.photos[i],x,y,cell,options,style,i)}if(style.filmPerforation)drawFilmPerforation(left,top,gridSize,options)}
    function drawBackground(style,w,h){ctx.fillStyle=style.background;ctx.fillRect(0,0,w,h);if(style.texture){ctx.save();ctx.globalAlpha=.12;for(let x=0;x<w;x+=28){ctx.fillStyle=x%56===0?"#fff":"#000";ctx.fillRect(x,0,1,h)}ctx.restore()}}
    function drawHeader(options,style,width){if(!options.title&&!options.subtitle)return;ctx.fillStyle=style.text;ctx.font="700 54px Arial";ctx.textBaseline="top";ctx.fillText(options.title,options.padding,options.padding*.72);if(options.subtitle){ctx.fillStyle=style.mutedText;ctx.font="400 28px Arial";ctx.fillText(options.subtitle,options.padding,options.padding*.72+68,width-options.padding*2)}}
    function drawFramedPhoto(photo,x,y,size,options,style,index){const frame=getFrameSize(options,style),radius=options.radius,outerX=x-frame.left,outerY=y-frame.top,outerW=size+frame.left+frame.right,outerH=size+frame.top+frame.bottom;ctx.save();if(style.photoShadow){ctx.shadowColor=style.photoShadow;ctx.shadowBlur=18;ctx.shadowOffsetY=10}roundedRect(ctx,outerX,outerY,outerW,outerH,radius+frame.left*.55);ctx.fillStyle=style.frameColor;ctx.fill();ctx.restore();if(style.innerStroke){ctx.save();roundedRect(ctx,outerX+4,outerY+4,outerW-8,outerH-8,radius+frame.left*.4);ctx.strokeStyle=style.innerStroke;ctx.lineWidth=3;ctx.stroke();ctx.restore()}ctx.save();roundedRect(ctx,x,y,size,size,Math.max(0,radius));ctx.clip();photo?drawCover(photo,x,y,size,size):drawPlaceholder(x,y,size,index);ctx.restore();if(style.polaroidLabel){ctx.fillStyle=style.mutedText;ctx.font="700 24px Arial";ctx.textAlign="center";ctx.fillText(String(index+1).padStart(2,"0"),outerX+outerW/2,y+size+frame.bottom*.38);ctx.textAlign="left"}}
    function drawPlaceholder(x,y,size,index){ctx.fillStyle="#e8edf3";ctx.fillRect(x,y,size,size);ctx.fillStyle="#8290a3";ctx.font="700 34px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(`PHOTO ${index+1}`,x+size/2,y+size/2);ctx.textAlign="left";ctx.textBaseline="alphabetic"}
    function drawFilmPerforation(left,top,size,options){const hole=Math.max(16,options.frame*.7),step=hole*2.3;ctx.fillStyle="#f4f1eb";for(let y=top;y<top+size;y+=step){roundedRect(ctx,left-options.frame*.68,y,hole,hole*1.25,3);ctx.fill();roundedRect(ctx,left+size+options.frame*.68-hole,y,hole,hole*1.25,3);ctx.fill()}}
    function getStyle(o){const base={background:o.background,frameColor:o.frameColor,text:"#172033",mutedText:"#667085",innerStroke:"rgba(0,0,0,.08)",photoShadow:"rgba(23,32,51,.18)",outerShadow:"rgba(23,32,51,.12)",shadowBase:"rgba(255,255,255,.8)",texture:false,polaroidLabel:false,filmPerforation:false};return{gallery:base,black:{...base,background:"#14171d",frameColor:"#050608",text:"#f8fafc",mutedText:"#b8c0cc",innerStroke:"rgba(255,255,255,.16)",shadowBase:"rgba(0,0,0,.7)"},wood:{...base,background:"#efe7dc",frameColor:"#8d6442",innerStroke:"rgba(70,38,18,.34)",texture:true},polaroid:{...base,background:"#ece8df",frameColor:"#fffdf8",polaroidLabel:true},film:{...base,background:"#1b1c20",frameColor:"#08090c",text:"#f8fafc",mutedText:"#c4cad4",innerStroke:"rgba(255,255,255,.18)",filmPerforation:true},soft:{...base,background:"#eef5f8",frameColor:"#fff",photoShadow:"rgba(35,95,159,.12)"},scrap:{...base,background:"#f0eadf",frameColor:"#fffaf0",texture:true,polaroidLabel:true}}[o.style]||base}
    function getFrameSize(o,s){const z=o.frame;if(s.polaroidLabel)return{top:z,right:z,bottom:z*2.3,left:z};if(s.filmPerforation)return{top:z,right:z*2.2,bottom:z,left:z*2.2};return{top:z,right:z,bottom:z,left:z}}
    function drawCover(img,x,y,w,h){const scale=Math.max(w/img.naturalWidth,h/img.naturalHeight),sw=w/scale,sh=h/scale,sx=(img.naturalWidth-sw)/2,sy=(img.naturalHeight-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}
    function roundedRect(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath()}
    function fileToImage(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>loadImage(reader.result).then(resolve,reject);reader.onerror=reject;reader.readAsDataURL(file)})}
    function loadImage(src){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=src})}
    function downloadPng(){elements.canvas.toBlob(blob=>{if(!blob){showMessage("PNG 저장에 실패했습니다.");return}const fileName=`nine-photo-frame-${Date.now()}.png`,url=URL.createObjectURL(blob),link=document.createElement("a");link.href=url;link.download=fileName;document.body.append(link);link.click();link.remove();addDownloadLink(url,fileName);showMessage("PNG를 만들었습니다. 다운로드가 막히면 아래 링크를 눌러 저장하세요.")},"image/png")}
    function addDownloadLink(url,fileName){const link=document.createElement("a");link.className="download-link";link.href=url;link.download=fileName;link.textContent=`${fileName} 저장`;elements.downloadShelf.prepend(link);while(elements.downloadShelf.children.length>3){const last=elements.downloadShelf.lastElementChild;URL.revokeObjectURL(last.href);last.remove()}}
    function showMessage(text){elements.message.textContent=text}
    function sampleDataUrl(i){const palettes=[["#7ab6e8","#f5f0de","#245b86"],["#d9ebf8","#2f6e96","#f0b35a"],["#b8d5ea","#ffffff","#6c8ca8"],["#89b8cf","#f6f2e8","#31556f"],["#cddce9","#456f91","#e6a35d"],["#a7c9dc","#f8f3e7","#2d526d"],["#d7e7ef","#547d9a","#dd8d57"],["#94bed7","#f4efe2","#21465d"],["#bdd7e8","#ffffff","#5e819b"]][i];const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="${palettes[0]}"/><stop offset="1" stop-color="${palettes[1]}"/></linearGradient></defs><rect width="900" height="900" fill="url(#g)"/><rect x="120" y="260" width="660" height="420" rx="18" fill="${palettes[1]}"/><path d="M90 290 L450 90 L810 290 Z" fill="${palettes[2]}"/><rect x="205" y="365" width="145" height="135" fill="${palettes[0]}"/><rect x="550" y="365" width="145" height="135" fill="${palettes[0]}"/><rect x="390" y="510" width="120" height="170" fill="${palettes[2]}"/><circle cx="665" cy="155" r="52" fill="#fff8d6" opacity=".9"/></svg>`;return"data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg)}
  </script>
</body>
</html>
